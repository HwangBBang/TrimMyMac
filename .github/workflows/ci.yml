name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    # TrimMyMac targets macOS 26 / Swift 6, so it needs the macOS 26 SDK (Xcode 26).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Toolchain info
        run: |
          sw_vers
          xcode-select -p
          xcodebuild -version || true
          swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Test
        # Plain `swift test` works here: a full Xcode toolchain exposes Testing.framework,
        # so Package.swift skips the CommandLineTools-only -F/-rpath flags.
        run: swift test
